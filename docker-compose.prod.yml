services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-botme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-botme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-botme}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-botme}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-botme}?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WEB_ORIGIN: ${WEB_ORIGIN:-https://bot-me.neeklo.ru}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-dsc-23@yandex.ru}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Джон Уик}
      NEEKLO_API_KEY: ${NEEKLO_API_KEY:-}
    expose:
      - "3001"
    ports:
      - "127.0.0.1:3021:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://bot-me.neeklo.ru}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 3000
    ports:
      - "127.0.0.1:3020:3000"
    expose:
      - "3000"

volumes:
  postgres_data:
  redis_data:
